name: Publish release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing immutable vX.Y.Z tag that points to this main commit
        required: true
        type: string

permissions:
  contents: read

jobs:
  windows-starter:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/heads/main
      - name: Run native PowerShell starter setup tests
        shell: powershell
        run: ./tests/test_windows_installer.ps1

  publish:
    if: github.ref == 'refs/heads/main'
    needs: windows-starter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/heads/main
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - name: Verify tag matches VERSION and this main commit
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          test "$RELEASE_TAG" = "v$version"
          main_commit=$(git ls-remote --exit-code origin refs/heads/main | awk '{print $1}')
          test -n "$main_commit"
          test "$main_commit" = "$(git rev-parse HEAD)"
          tag_commit=$(git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG^{}" | awk '{print $1}')
          test -n "$tag_commit"
          test "$tag_commit" = "$main_commit"
      - name: Parse scripts and validate template
        run: |
          bash -n bootstrap.sh install.sh scripts/package_release.sh tests/*.sh
          python3 scripts/validate_vault.py template
      - name: Run tests
        run: |
          python3 -m unittest discover -s tests -v
          bash tests/test_installer.sh
          bash tests/test_release.sh
      - name: Build release payload with the protected signing key
        env:
          WIKI_INSTALLER_SIGNING_KEY: ${{ secrets.WIKI_INSTALLER_SIGNING_KEY }}
        run: |
          test -n "$WIKI_INSTALLER_SIGNING_KEY" || { echo "WIKI_INSTALLER_SIGNING_KEY is required" >&2; exit 1; }
          signing_key="$RUNNER_TEMP/wiki-installer-release-private.pem"
          umask 077
          printf '%s' "$WIKI_INSTALLER_SIGNING_KEY" > "$signing_key"
          openssl pkey -in "$signing_key" -noout -check
          bash scripts/package_release.sh \
            --output dist \
            --signing-key "$signing_key" \
            --public-key keys/release-public-key.pem
          rm -f "$signing_key"
      - name: Publish checked release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/wiki-installer-*.tar.gz \
            dist/llm-wiki-starter-*.zip \
            dist/release-manifest.json \
            dist/release-manifest.json.sig \
            dist/bootstrap.sh \
            dist/bootstrap.sh.sig \
            --generate-notes
